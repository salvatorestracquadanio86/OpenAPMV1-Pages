---
layout: default
---
<section class="post-header">
  <div class="container" style="max-width:760px">
    <p class="post-meta">{{ page.date | date: "%B %d, %Y" }}{% if page.author %} &middot; {{ page.author }}{% endif %}</p>
    <h1>{{ page.title }}</h1>
    {% if page.tags %}
    <div class="post-tags" style="margin-top:16px">
      {% for tag in page.tags %}
      <span class="tag tag-light">{{ tag }}</span>
      {% endfor %}
    </div>
    {% endif %}
  </div>
</section>

<div class="container">
  <div class="post-body">
    {{ content }}
    <div class="post-back">
      <a href="{{ '/blog/' | relative_url }}">← Back to Progress</a>
    </div>
  </div>
</div>
